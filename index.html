<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Library | Enterprise Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <div class="brand">MK Admin</div>
        <nav>
            <div class="nav-link active" onclick="showSection('users', this)">👥 Users List</div>
            <div class="nav-link" onclick="showSection('books', this)">📚 Books Inventory</div>
            <div class="nav-link" onclick="showSection('add', this)">➕ Add New Entry</div>
            <div class="nav-link" onclick="showSection('issue', this)">🎫 Issue/Return</div>
        </nav>
    </div>

    <div class="main-body">
        <header class="top-bar">
            <h2 id="page-title">Users List</h2>
        </header>

        <section id="users-section" class="data-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-body"></tbody>
                </table>
            </div>
        </section>

        <section id="books-section" class="data-section" style="display:none;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Available Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="book-body"></tbody>
                </table>
            </div>
        </section>

        <section id="add-section" class="data-section" style="display:none;">
            <div class="form-grid">
                <div class="admin-card">
                    <h3>Register New User</h3>
                    <form onsubmit="handleUserSubmit(event)">
                        <input type="text" id="uName" placeholder="Full Name" required>
                        <input type="email" id="uEmail" placeholder="Email Address" required>
                        <input type="text" id="uPhone" placeholder="Phone Number" required>
                        <button type="submit" class="btn-save">Register Member</button>
                    </form>
                </div>
                <div class="admin-card">
                    <h3>Add New Book</h3>
                    <form onsubmit="handleBookSubmit(event)">
                        <input type="text" id="bTitle" placeholder="Book Title" required>
                        <input type="text" id="bAuthor" placeholder="Author Name" required>
                        <input type="text" id="bCategory" placeholder="Category">
                        <input type="text" id="bIsbn" placeholder="ISBN">
                        <input type="number" id="bQty" placeholder="Total Quantity" required>
                        <button type="submit" class="btn-save btn-book">Add Book</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="issue-section" class="data-section" style="display:none;">
            <div class="admin-card compact-card">
                <h3>Issue Book Desk</h3>
                <form onsubmit="handleIssueSubmit(event)">
                    <input type="number" id="issueUId" placeholder="User ID" required>
                    <input type="number" id="issueBId" placeholder="Book ID" required>
                    <button type="submit" class="btn-save">Confirm Issue</button>
                </form>
            </div>
        </section>
    </div>

    <div id="details-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">×</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
